<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GraceDaily | Tvá denní cesta</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #0b130e; --card-bg: #142219; --accent-color: #4ade80; --text-main: #f3f4f6; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 650px; text-align: center; }
        .cross-icon { color: var(--accent-color); margin-bottom: 10px; }
        h1 { font-size: 2rem; margin-bottom: 20px; color: var(--accent-color); }
        .display-card { background: var(--card-bg); border-radius: 20px; padding: 30px; margin-bottom: 20px; }
        .verse-text { font-size: 1.2rem; margin-bottom: 15px; font-style: italic; }
        .verse-ref { color: var(--accent-color); font-weight: 700; margin-bottom: 20px; }
        .challenge-card { border: 1px solid var(--accent-color); border-radius: 15px; padding: 20px; background: rgba(74, 222, 128, 0.05); }
    </style>
</head>
<body>
    <div class="container">
        <div class="cross-icon">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="2" x2="12" y2="22"/><line x1="7" y1="8" x2="17" y2="8"/></svg>
        </div>
        <h1>GraceDaily</h1>
        <div class="display-card">
            <div id="verse-content">Načítám tvou cestu...</div>
        </div>
        <div class="challenge-card">
            <p style="font-size: 0.7rem; color: var(--accent-color); text-transform: uppercase;">Výzva pro dnešní den</p>
            <p id="challenge-content" style="margin-top:10px;">Načítám výzvu...</p>
        </div>
    </div>

    <script>
        const verses = [
            {v:"Neboj se, vždyť já jsem s tebou.", r:"Izajáš 41:10"},
            {v:"Pojďte ke mně všichni, kdo se namáháte.", r:"Matouš 11:28"},
            {v:"Hospodin je můj pastýř.", r:"Žalm 23:1"},
            {v:"Všechno mohu v Kristu, který mi dává sílu.", r:"Filipským 4:13"},
            {v:"Blízko je Hospodin těm, kdo jsou zkrušeni v srdci.", r:"Žalm 34:19"}
        ];
        const challenges = ["Napiš někomu hezkou zprávu.", "Dnes se vyhni stěžování.", "Zastav se na 5 minut v tichu.", "Udělej dnes tajný dobrý skutek.", "Poděkuj za tři věci."];

        function getDailyItem(arr, key) {
            let used = JSON.parse(localStorage.getItem(key) || "[]");
            if (used.length >= arr.length) used = []; // Reset, pokud jsme vyčerpali vše
            
            let available = arr.filter((_, idx) => !used.includes(idx));
            let selectedIdx = arr.indexOf(available[0]);
            
            used.push(selectedIdx);
            localStorage.setItem(key, JSON.stringify(used));
            return arr[selectedIdx];
        }

        const dailyVerse = getDailyItem(verses, 'usedVerses');
        const dailyChallenge = getDailyItem(challenges, 'usedChallenges');

        document.getElementById('verse-content').innerHTML = `<p class="verse-text">„${dailyVerse.v}“</p><p class="verse-ref">${dailyVerse.r}</p>`;
        document.getElementById('challenge-content').innerText = dailyChallenge;
    </script>
</body>
</html>
