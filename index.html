<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GraceDaily | Světlo pro tvou duši</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #0b130e; --card-bg: #142219; --accent-color: #4ade80; --text-main: #f3f4f6; --text-muted: #9ca3af; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 650px; text-align: center; }
        h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 20px; color: var(--accent-color); }
        .mood-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 30px; }
        .mood-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); color: var(--text-main); padding: 12px; border-radius: 12px; cursor: pointer; font-size: 0.9rem; transition: 0.2s; }
        .mood-btn.active { background: var(--accent-color); color: #000; }
        .display-card { background: var(--card-bg); border-radius: 24px; padding: 30px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .challenge-card { background: rgba(74, 222, 128, 0.1); border: 1px solid var(--accent-color); border-radius: 20px; padding: 20px; margin-top: 20px; }
        .challenge-title { color: var(--accent-color); font-weight: 700; text-transform: uppercase; font-size: 0.8rem; margin-bottom: 10px; }
        .verse-text { font-size: 1.2rem; margin-bottom: 15px; }
        .verse-ref { color: var(--accent-color); font-weight: 600; margin-bottom: 20px; }
        .prayer-text { font-style: italic; color: var(--text-muted); }
    </style>
</head>
<body>
    <div class="container">
        <h1>GraceDaily</h1>
        <div class="mood-container">
            <button class="mood-btn" onclick="generateContent('strach', this)">Strach</button>
            <button class="mood-btn" onclick="generateContent('unava', this)">Únava</button>
            <button class="mood-btn" onclick="generateContent('samota', this)">Samota</button>
            <button class="mood-btn" onclick="generateContent('vdecnost', this)">Vděčnost</button>
        </div>

        <div class="display-card" id="card">
            <div id="content-box">
                <p class="verse-text">„Neboť já vím, jaké úmysly mám s vámi, praví Hospodin.“</p>
                <p class="verse-ref">Jeremjáš 29:11</p>
                <p class="prayer-text">Pane, odevzdávám ti svůj den.</p>
            </div>
        </div>

        <div class="challenge-card">
            <p class="challenge-title">Výzva pro dnešní den</p>
            <p id="challenge-text" style="font-size: 1.1rem;">Dnes se zastav na 5 minut v tichu a poděkuj za tři věci, které jsi dnes přehlédl.</p>
        </div>
    </div>

    <script>
        const data = {
            strach: [{verse: "Neboj se, vždyť já jsem s tebou.", ref: "Izajáš 41:10", prayer: "Otče, daruj mi klid."}],
            unava: [{verse: "Pojďte ke mně, všichni, kdo se namáháte.", ref: "Matouš 11:28", prayer: "Pane, odpočívám v tobě."}],
            samota: [{verse: "Hospodin sám půjde před tebou.", ref: "Dt 31:8", prayer: "Děkuji, že jsi se mnou."}],
            vdecnost: [{verse: "Ve všem vzdávejte díky.", ref: "1. Tes 5:18", prayer: "Uč mě vděčnosti."}]
        };
        const challenges = [
            "Dnes někomu upřímně poděkuj za to, co pro tebe dělá.",
            "Zavolej dnes někomu, s kým jsi dlouho nemluvil, jen abys slyšel, jak se má.",
            "Dnes se vyhni stěžování si na cokoliv – zkus hledat na všem něco pozitivního.",
            "Zastav se dnes na 5 minut v naprostém tichu bez telefonu.",
            "Udělej dnes malý dobrý skutek, o kterém se nikdo nedozví."
        ];
        function generateContent(mood, el) {
            document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            const v = data[mood][0];
            document.getElementById('content-box').innerHTML = `<p class="verse-text">„${v.verse}“</p><p class="verse-ref">${v.ref}</p><p class="prayer-text">${v.prayer}</p>`;
            document.getElementById('challenge-text').innerText = challenges[Math.floor(Math.random() * challenges.length)];
        }
    </script>
</body>
</html>
