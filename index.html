<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameCompass | Tvůj herní průvodce</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --dark: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f1f5f9; }
        body { background-color: var(--dark); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; text-align: center; }
        h1 { font-size: 2rem; margin-bottom: 5px; color: var(--accent); font-weight: 800; }
        .subtitle { color: #64748b; font-size: 0.9rem; margin-bottom: 25px; }
        .search-box { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #334155; background: var(--card); color: white; margin-bottom: 15px; font-size: 1rem; box-sizing: border-box; outline: none; text-align: center; }
        .search-box:focus { border-color: var(--accent); }
        .btn-search { width: 100%; padding: 15px; background: var(--accent); border: none; border-radius: 12px; color: var(--dark); font-weight: 800; cursor: pointer; transition: 0.3s; font-size: 1rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-search:hover { filter: brightness(1.2); transform: translateY(-1px); }
        #status-msg { margin-top: 15px; color: #94a3b8; font-size: 0.9rem; font-style: italic; }
        #game-result { margin-top: 25px; display: none; text-align: left; }
        .game-card { background: var(--card); border-radius: 16px; padding: 20px; border: 1px solid rgba(56, 189, 248, 0.1); box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .game-title { font-size: 1.4rem; margin-bottom: 15px; color: #fff; text-align: center; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        .grid-links { display: flex; flex-direction: column; gap: 10px; }
        .btn-link { display: block; width: 100%; padding: 14px; background: #334155; color: white; text-align: center; text-decoration: none; border-radius: 8px; font-weight: 600; box-sizing: border-box; transition: 0.2s; }
        .btn-link:hover { background: #475569; border-left: 4px solid var(--accent); }
        .btn-link.youtube { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }
        .btn-link.youtube:hover { background: rgba(239, 68, 68, 0.2); }
        .btn-link.steam { background: rgba(56, 189, 248, 0.1); color: var(--accent); border: 1px solid rgba(56, 189, 248, 0.2); }
        .btn-link.steam:hover { background: rgba(56, 189, 248, 0.2); }
    </style>
</head>
<body>
    <div class="container">
        <h1>GameCompass 🎮</h1>
        <div class="subtitle">Tvůj okamžitý navigátor herními achievementy a návody</div>
        
        <input type="text" id="game-input" class="search-box" placeholder="Zadej název jakékoliv hry..." onkeypress="handleKeyPress(event)">
        <button class="btn-search" onclick="searchGame()">Spustit vyhledávání</button>
        
        <div id="status-msg"></div>

        <div id="game-result" class="game-card">
            <h2 id="game-title" class="game-title"></h2>
            <div class="grid-links">
                <a id="achieve-link" href="#" target="_blank" rel="noopener noreferrer" class="btn-link steam">🏆 Kompletní návod na Achievementy</a>
                <a id="guide-link" href="#" target="_blank" rel="noopener noreferrer" class="btn-link youtube">📺 Najít Video-návod (YouTube)</a>
                <a id="reddit-link" href="#" target="_blank" rel="noopener noreferrer" class="btn-link">💬 Co radí komunita na Redditu?</a>
            </div>
        </div>
    </div>

    <script>
        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                searchGame();
            }
        }

        function searchGame() {
            const inputEl = document.getElementById('game-input');
            const query = inputEl.value.trim();
            const statusMsg = document.getElementById('status-msg');
            const resultBox = document.getElementById('game-result');
            
            if (!query) {
                statusMsg.innerText = "Napiš nejdříve název hry!";
                return;
            }

            statusMsg.innerText = "Generuji herní mapu...";
            
            // Nastavení textu hry do karty
            document.getElementById('game-title').innerText = `Odkazy pro hru: ${query}`;
            
            // Vytvoření perfektních vyhledávacích dotazů bez chyb
            const cleanQuery = encodeURIComponent(query);
            
            document.getElementById('achieve-link').href = `https://www.google.com/search?q=${cleanQuery}+achievements+guide+trophies`;
            document.getElementById('guide-link').href = `https://www.youtube.com/results?search_query=${cleanQuery}+walkthrough+guide`;
            document.getElementById('reddit-link').href = `https://www.google.com/search?q=${cleanQuery}+stuck+help+site:reddit.com`;
            
            // Zobrazení výsledku
            statusMsg.innerText = "";
            resultBox.style.display = 'block';
        }
    </script>
</body>
</html>
