<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameCompass | Tvůj herní průvodce</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --dark: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f1f5f9; }
        body { background-color: var(--dark); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; }
        h1 { font-size: 1.8rem; margin-bottom: 20px; color: var(--accent); }
        .search-box { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #334155; background: var(--card); color: white; margin-bottom: 20px; font-size: 1rem; }
        .btn-search { width: 100%; padding: 15px; background: var(--accent); border: none; border-radius: 12px; color: var(--dark); font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-search:hover { filter: brightness(1.2); }
        #game-result { margin-top: 30px; display: none; }
        .game-card { background: var(--card); border-radius: 16px; padding: 20px; border: 1px solid #334155; }
        .game-card img { width: 100%; border-radius: 10px; margin-bottom: 15px; }
        .btn-link { display: block; width: 100%; padding: 10px; background: #334155; color: white; text-align: center; text-decoration: none; border-radius: 8px; margin-top: 10px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <h1>GameCompass 🎮</h1>
        <input type="text" id="game-input" class="search-box" placeholder="Jakou hru hledáš? (např. Elden Ring)">
        <button class="btn-search" onclick="searchGame()">HLEDAT HRU</button>

        <div id="game-result" class="game-card">
            <img id="game-img" src="" alt="Game Art">
            <h2 id="game-title"></h2>
            <p id="game-info"></p>
            <a id="guide-link" href="#" target="_blank" class="btn-link">🔍 Najít návod na YouTube</a>
            <a id="achieve-link" href="#" target="_blank" class="btn-link">🏆 Achievement Guide</a>
        </div>
    </div>

    <script>
        async function searchGame() {
            const query = document.getElementById('game-input').value;
            const res = await fetch(`https://api.rawg.io/api/games?search=${query}&key=4c75908323a64964893799637a78370d`);
            const data = await res.json();
            const game = data.results[0];
            
            if (game) {
                document.getElementById('game-img').src = game.background_image;
                document.getElementById('game-title').innerText = game.name;
                document.getElementById('game-info').innerText = `Rok vydání: ${game.released || 'Neznámý'}`;
                document.getElementById('guide-link').href = `https://www.youtube.com/results?search_query=${game.name}+walkthrough`;
                document.getElementById('achieve-link').href = `https://www.google.com/search?q=${game.name}+achievements+guide`;
                document.getElementById('game-result').style.display = 'block';
            } else {
                alert("Hru se nepodařilo najít. Zkus jiný název!");
            }
        }
    </script>
</body>
</html>
