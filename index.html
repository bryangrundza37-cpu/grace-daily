<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GraceDaily | Tvá denní cesta</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #0b130e; --card-bg: #142219; --accent-color: #4ade80; --text-main: #f3f4f6; --text-muted: #9ca3af; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 650px; text-align: center; }
        .cross-icon { color: var(--accent-color); margin-bottom: 10px; }
        h1 { font-size: 2rem; margin-bottom: 20px; color: var(--accent-color); }
        .display-card { background: var(--card-bg); border-radius: 20px; padding: 30px; margin-bottom: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .verse-text { font-size: 1.2rem; margin-bottom: 15px; font-style: italic; line-height: 1.6; }
        .verse-ref { color: var(--accent-color); font-weight: 700; margin-bottom: 20px; }
        .challenge-card { border: 1px solid var(--accent-color); border-radius: 15px; padding: 20px; background: rgba(74, 222, 128, 0.05); margin-bottom: 20px; transition: 0.3s; }
        .challenge-card.done { border-color: #22c55e; background: rgba(34, 197, 94, 0.15); }
        .btn-done { background: var(--accent-color); color: #000; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 15px; transition: 0.2s; }
        .btn-done:hover { opacity: 0.9; }
        .reflection-section { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); border-radius: 15px; padding: 20px; text-align: left; }
        .reflection-title { color: var(--text-muted); font-size: 0.85rem; font-weight: 600; text-transform: uppercase; margin-bottom: 10px; text-align: center; }
        textarea { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 12px; color: var(--text-main); font-size: 0.95rem; resize: none; min-height: 100px; outline: none; }
        textarea:focus { border-color: var(--accent-color); }
    </style>
</head>
<body>
    <div class="container">
        <div class="cross-icon">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="2" x2="12" y2="22"/><line x1="7" y1="8" x2="17" y2="8"/></svg>
        </div>
        <h1>GraceDaily</h1>
        
        <div class="display-card">
            <div id="verse-content">Načítám tvou cestu...</div>
        </div>

        <div class="challenge-card" id="challenge-box">
            <p style="font-size: 0.7rem; color: var(--accent-color); text-transform: uppercase; letter-spacing: 1px;">Výzva pro dnešní den</p>
            <p id="challenge-content" style="margin-top:10px; font-size: 1.1rem;"></p>
            <button class="btn-done" id="done-btn" onclick="completeChallenge()">Mám splněno!</button>
        </div>

        <div class="reflection-section">
            <p class="reflection-title">Moje večerní vděčnost & myšlenky</p>
            <textarea id="reflection-text" placeholder="Za co dnes můžu poděkovat? Co se mi honí hlavou? (Ukládá se automaticky...)" oninput="saveReflection()"></textarea>
        </div>
    </div>

    <script>
        const verses = [
            {v:"Neboj se, vždyť já jsem s tebou. Nerozhlížej se úzkostlivě, já jsem tvůj Bůh.", r:"Izajáš 41:10"},
            {v:"Pojďte ke mně, všichni, kdo se namáháte a jste obtíženi, a já vám dám odpočinout.", r:"Matouš 11:28"},
            {v:"Hospodin je můj pastýř, nebudu mít nedostatek. Vodí mě na klidná místa u vod.", r:"Žalm 23:1"},
            {v:"Všechno mohu v Kristu, který mi dává sílu.", r:"Filipským 4:13"},
            {v:"Blízko je Hospodin těm, kdo jsou zkrušeni v srdci, zachraňuje ty, jejichž duch je zdeptán.", r:"Žalm 34:19"}
        ];
        const challenges = [
            "Napiš někomu hezkou zprávu jen tak, abys mu zlepšil den.",
            "Dnes se vědomě vyhni jakémukoliv stěžování si na únavu nebo lidi.",
            "Zastav se dnes na 5 minut v naprostém tichu bez telefonu.",
            "Udeláš dnes jeden drobný dobrý skutek v naprosté tajnosti.",
            "Poděkuj dnes v duchu za tři konkrétní maličkosti, které bereš jako samozřejmost."
        ];

        function getDailyIdx(arr, key) {
            const today = new Date();
            const dateStr = today.getFullYear() + "-" + today.getMonth() + "-" + today.getDate();
            
            // Pokud se změnil den, vygenerujeme nový index, který jsme ještě nepoužili
            let state = JSON.parse(localStorage.getItem(key) || "{}");
            if (state.date !== dateStr) {
                let used = state.used || [];
                if (used.length >= arr.length) used = [];
                
                let available = arr.map((_, i) => i).filter(i => !used.includes(i));
                let newIdx = available[Math.floor(Math.random() * available.length)];
                
                used.push(newIdx);
                state = { date: dateStr, idx: newIdx, used: used, completed: false };
                localStorage.setItem(key, JSON.stringify(state));
            }
            return state;
        }

        const verseState = getDailyIdx(verses, 'vState');
        const challengeState = getDailyIdx(challenges, 'cState');

        // Vykreslení
        document.getElementById('verse-content').innerHTML = `<p class="verse-text">„${verses[verseState.idx].v}“</p><p class="verse-ref">${verses[verseState.idx].r}</p>`;
        document.getElementById('challenge-content').innerText = challenges[challengeState.idx];

        // Kontrola splnění výzvy
        if (challengeState.completed) {
            markAsDone();
        }

        function completeChallenge() {
            let state = JSON.parse(localStorage.getItem('cState'));
            state.completed = true;
            localStorage.setItem('cState', JSON.stringify(state));
            markAsDone();
        }

        function markAsDone() {
            document.getElementById('challenge-box').classList.add('done');
            document.getElementById('challenge-content').innerHTML = "<strong>Skvělá práce! Výzva splněna.</strong> 🎉";
            document.getElementById('done-btn').style.display = 'none';
        }

        // Správa reflexe
        const todayStr = new Date().toDateString();
        document.getElementById('reflection-text').value = localStorage.getItem('ref_' + todayStr) || "";

        function saveReflection() {
            const text = document.getElementById('reflection-text').value;
            localStorage.setItem('ref_' + todayStr, text);
        }
    </script>
</body>
</html>
