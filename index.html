<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GraceDaily | Cesta k modlitbě</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #0b130e; --card-bg: #142219; --accent-color: #4ade80; --text-main: #f3f4f6; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 650px; }
        .btn-link { display: block; width: 100%; padding: 15px; background: rgba(74, 222, 128, 0.1); border: 1px solid var(--accent-color); border-radius: 12px; color: var(--accent-color); text-decoration: none; text-align: center; font-weight: 600; margin-bottom: 20px; }
        .guide-box { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 15px; margin-bottom: 20px; border-left: 4px solid var(--accent-color); }
        h2 { color: var(--accent-color); font-size: 1.1rem; margin-bottom: 10px; }
        .prayer-btn { background: var(--accent-color); color: #000; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>GraceDaily</h1>
        
        <!-- Odkaz na živé vysílání -->
        <a href="https://www.tvnoe.cz/" target="_blank" class="btn-link">Sledovat živé vysílání (TV Noe)</a>

        <div class="guide-box">
            <h2>Tvůj čas s Bohem</h2>
            <p id="guide-text">Cítíš potřebu o něčem mluvit? Napiš sem své trápení nebo radost jako úmysl pro svou modlitbu. Pomohu ti ji formulovat.</p>
            <textarea id="prayer-input" style="width:100%; background:rgba(0,0,0,0.2); color:#fff; border:1px solid #444; padding:10px; margin:10px 0; border-radius:8px;"></textarea>
            <button class="prayer-btn" onclick="transformToPrayer()">Proměnit v modlitbu</button>
        </div>

        <div id="prayer-result" style="display:none; padding:20px; background:rgba(74,222,128,0.05); border-radius:15px; font-style:italic;"></div>
    </div>

    <script>
        function transformToPrayer() {
            const input = document.getElementById('prayer-input').value;
            if(!input) return;
            const res = document.getElementById('prayer-result');
            res.style.display = "block";
            res.innerHTML = `<strong>Tvá modlitba:</strong><br><br>„Pane, přicházím k Tobě s tím, co mám v srdci: ${input}. Prosím, dej mi sílu to nést, veď mé kroky a naplň mě svým pokojem. Amen.“<br><br><small><em>(Přečti si nyní tato slova pomalu nahlas.)</em></small>`;
        }
    </script>
</body>
</html>
